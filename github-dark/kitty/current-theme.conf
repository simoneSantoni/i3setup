# vim:ft=kitty

## name: GitHub Dark
## author: projekt0n (https://github.com/projekt0n)
## license: MIT
## upstream: https://github.com/projekt0n/github-nvim-theme
## blurb: GitHub's dark color scheme for kitty


#: The basic colors

foreground #e6edf3
background #0d1117
selection_foreground #e6edf3
selection_background #264f78


#: Cursor colors

cursor #2f81f7
cursor_text_color #0d1117


#: URL underline color when hovering with mouse

url_color #58a6ff


#: kitty window border colors and terminal bell colors

active_border_color #30363d
inactive_border_color #0d1117
bell_border_color #d29922
visual_bell_color none


#: OS Window titlebar colors

wayland_titlebar_color #161b22
macos_titlebar_color #161b22


#: Tab bar colors

active_tab_foreground #e6edf3
active_tab_background #0d1117
inactive_tab_foreground #8b949e
inactive_tab_background #161b22
tab_bar_background #161b22
tab_bar_margin_color none


#: Colors for marks (marked text in the terminal)

mark1_foreground #0d1117
mark1_background #2f81f7
mark2_foreground #0d1117
mark2_background #3fb950
mark3_foreground #0d1117
mark3_background #d29922


#: The basic 16 colors

#: black
color0 #484f58
color8 #6e7681

#: red
color1 #ff7b72
color9 #ffa198

#: green
color2 #3fb950
color10 #56d364

#: yellow
color3 #d29922
color11 #e3b341

