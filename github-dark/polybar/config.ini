[colors]
; GitHub Dark/Light (projekt0n/github-nvim-theme)
background = #0d1117
background-alt = #161b22
foreground = #e6edf3
primary = #2f81f7
secondary = #1f6feb
alert = #f85149
disabled = #484f58
accent = #58a6ff
green = #3fb950


[bar/example]
monitor = ${env:MONITOR:eDP}
width = 100%
height = 22pt
radius = 5

dpi = 96

bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "UbuntuSans Nerd Font:size=13;4"
;font-1 = "Font Awesome 6 Free:style=Solid:size=13;1"
font-2 = "Symbols Nerd Font:size=13;4"

modules-left = xworkspaces
modules-right = keyboard caffeine theme lxappearance brightness layout-extended layout-external speaker pulseaudio microphone memory cpu battery wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
; type = internal/xwindow
; label = %title:0:60:...%

[module/filesystem]
; type = internal/fs
; interval = 25
;
; mount-0 = /
;
; label-mounted = %{F#2f81f7}%mountpoint%%{F-} %percentage_used%%
;
; label-unmounted = %mountpoint% not mounted
; label-unmounted-foreground = ${colors.disabled}

[module/speaker]
type = custom/script
exec = ~/.config/polybar/scripts/speaker-select.sh
interval = 2
click-left = ~/.config/polybar/scripts/speaker-select.sh --cycle
format = <label>
label = %output%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįĖÄ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĖĀ
label-muted-foreground = ${colors.disabled}

use-ui-max = true
interval = 1

[module/microphone]
type = custom/script
exec = ~/.config/polybar/scripts/microphone.sh
interval = 1
click-left = ~/.config/polybar/scripts/microphone.sh --toggle
format = <label>
label = %output%

[module/keyboard]
type = custom/script
exec = ~/.config/polybar/scripts/keyboard-layout.sh --get
interval = 1
click-left = ~/.config/polybar/scripts/keyboard-layout.sh --cycle
format = <label>
format-padding = 1
label = %output%
label-font = 2

[module/caffeine]
type = custom/script
exec = ~/.config/polybar/scripts/caffeine.sh
interval = 1
click-left = ~/.config/polybar/scripts/caffeine.sh --toggle
format = <label>
format-padding = 1
label = %output%

[module/theme]
type = custom/script
exec = ~/.config/polybar/scripts/theme-toggle.sh
interval = 5
click-left = ~/.config/polybar/scripts/theme-toggle.sh --toggle
format = <label>
format-padding = 1
label = %output%

[module/lxappearance]
type = custom/text
content = ůįŹė
content-padding = 1
click-left = lxappearance &

[module/brightness]
type = custom/script
exec = ~/.config/polybar/scripts/brightness.sh
interval = 2
scroll-up = ~/.config/polybar/scripts/brightness.sh --up
scroll-down = ~/.config/polybar/scripts/brightness.sh --down
format = <label>
format-prefix-foreground = ${colors.primary}
label = %output%

[module/monitor-edp]
type = custom/script
exec = ~/.config/polybar/scripts/monitor-toggle.sh --display eDP "eDP"
interval = 2
click-left = ~/.config/polybar/scripts/monitor-toggle.sh --toggle eDP
format = <label>
label = %output%

[module/monitor-dp]
type = custom/script
exec = ~/.config/polybar/scripts/monitor-toggle.sh --display DisplayPort-1 "DP"
interval = 2
click-left = ~/.config/polybar/scripts/monitor-toggle.sh --toggle DisplayPort-1
format = <label>
label = %output%

[module/screen-layout]
type = custom/script
exec = ~/.config/polybar/scripts/screen-layout.sh
interval = 2
click-left = ~/.config/polybar/scripts/screen-layout.sh --cycle
format = <label>
label = %output%

[module/layout-extended]
type = custom/script
exec = ~/.config/polybar/scripts/screen-layout.sh --indicator extend-right ůįćĻůįĀĒůįćĻ
interval = 2
click-left = ~/.config/polybar/scripts/screen-layout.sh --set extend-right
format = <label>
label = %output%

[module/layout-external]
type = custom/script
exec = ~/.config/polybar/scripts/screen-layout.sh --indicator external-only "ůį∂ź ůįćĻ"
interval = 2
click-left = ~/.config/polybar/scripts/screen-layout.sh --set external-only
format = <label>
label = %output%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįėö "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#2f81f7}%ifname%%{F#484f58} disconnected

[module/wlan]
type = internal/network
inherit = network-base
interface-type = wireless
label-connected = %{F#2f81f7}ůį§®%{F-} %{F#1f6feb}%essid%%{F-} %local_ip%
format-connected = <label-connected>
format-disconnected = %{F#484f58}ůį§≠

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#2f81f7}ůįąĀ%{F-} %{F#1f6feb} %local_ip%%{F-}
format-connected = <label-connected>
format-disconnected = %{F#484f58}ůįąā

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

label-charging = %{T1}%{T-}  %percentage%%
label-discharging = %{T1}%{T-}  %percentage%%
label-full = %{T1}%{T-}  Full

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

[module/date]
type = internal/date
interval = 5

date = "%a %d %b"
time = "%H:%M"

label = %{T1}%{T-}  %date% %time%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
